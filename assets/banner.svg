<svg width="1280" height="400" viewBox="0 0 1280 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bannerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0a1e"/>
      <stop offset="60%" stop-color="#080816"/>
      <stop offset="100%" stop-color="#0e0a1a"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="28%" cy="50%" r="38%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="72%" cy="50%" r="38%">
      <stop offset="0%" stop-color="#d946ef" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#d946ef" stop-opacity="0"/>
    </radialGradient>

    <!-- Icon gradients -->
    <linearGradient id="it" x1="100" y1="148" x2="300" y2="148" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
    <linearGradient id="ib" x1="300" y1="252" x2="100" y2="252" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="wordG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="shG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0d0b22"/>
    </linearGradient>
    <linearGradient id="lkG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#a21caf"/>
    </linearGradient>

    <filter id="arcGlowB" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlowB" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <marker id="ba1" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0,0.5 L 9,5 L 0,9.5 L 3,5 Z" fill="#d946ef"/>
    </marker>
    <marker id="ba2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0,0.5 L 9,5 L 0,9.5 L 3,5 Z" fill="#22d3ee"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1280" height="400" fill="url(#bannerBg)"/>
  <rect width="1280" height="400" fill="url(#glowLeft)"/>
  <rect width="1280" height="400" fill="url(#glowRight)"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#ffffff" fill-opacity="0.035"/>
  </pattern>
  <rect width="1280" height="400" fill="url(#dots)"/>

  <!-- Top edge accent line -->
  <line x1="0" y1="0" x2="1280" y2="0" stroke="#4f46e5" stroke-width="2" stroke-opacity="0.5"/>

  <!-- === ICON (left, centered vertically) === -->
  <!-- Icon center: (200, 200) radius: 110 -->
  <!-- Orbit track -->
  <circle cx="200" cy="200" r="110" fill="none" stroke="#ffffff" stroke-width="1.5"
          stroke-opacity="0.05" stroke-dasharray="5 10"/>

  <!-- Top arc -->
  <path d="M 100,164 A 110,110 0 0,1 300,164"
        fill="none" stroke="url(#it)" stroke-width="14" stroke-linecap="round"
        filter="url(#arcGlowB)" marker-end="url(#ba1)"/>

  <!-- Bottom arc -->
  <path d="M 300,236 A 110,110 0 0,1 100,236"
        fill="none" stroke="url(#ib)" stroke-width="14" stroke-linecap="round"
        filter="url(#arcGlowB)" marker-end="url(#ba2)"/>

  <!-- Gap dots -->
  <circle cx="310" cy="200" r="5" fill="#d946ef" opacity="0.45"/>
  <circle cx="90" cy="200" r="5" fill="#22d3ee" opacity="0.45"/>

  <!-- Shield -->
  <path d="M 200,126 L 252,154 L 252,204 Q 252,240 200,260 Q 148,240 148,204 L 148,154 Z"
        fill="url(#shG)" stroke="#5b5bd6" stroke-width="2" stroke-opacity="0.9"/>
  <path d="M 200,136 L 244,161 L 244,202 Q 244,232 200,250"
        fill="none" stroke="#818cf8" stroke-width="1" stroke-opacity="0.25"/>

  <!-- Lock shackle -->
  <path d="M 183,201 L 183,184 A 17,20 0 0,1 217,184 L 217,201"
        fill="none" stroke="#d946ef" stroke-width="10" stroke-linecap="round" opacity="0.88"/>

  <!-- Lock body -->
  <rect x="171" y="199" width="58" height="48" rx="10" fill="url(#lkG)" opacity="0.9"/>

  <!-- Keyhole -->
  <circle cx="200" cy="220" r="9" fill="#0d0b22"/>
  <rect x="195.5" y="220" width="9" height="16" rx="3" fill="#0d0b22"/>

  <!-- Top accent dot -->
  <circle cx="200" cy="112" r="4.5" fill="#6366f1" opacity="0.55"/>

  <!-- === TEXT SECTION === -->
  <!-- Main title -->
  <text x="400" y="192"
        font-family="'Segoe UI', 'SF Pro Display', -apple-system, BlinkMacSystemFont, system-ui, sans-serif"
        font-size="82" font-weight="800" letter-spacing="-3">
    <tspan fill="#f1f5f9" filter="url(#textGlowB)">Klosed</tspan><tspan fill="url(#wordG)">Loop</tspan>
  </text>

  <!-- Tagline -->
  <text x="403" y="234"
        font-family="'Segoe UI', 'SF Pro Display', -apple-system, system-ui, sans-serif"
        font-size="18" font-weight="400" letter-spacing="4.5" fill="#64748b">
    EPHEMERAL CLOUD VPN  ·  SPOT PRICING  ·  WIREGUARD®
  </text>

  <!-- Feature badges -->
  <!-- Badge 1: Self-Hosted -->
  <rect x="403" y="270" width="148" height="36" rx="8" fill="#1e1b4b" stroke="#4f46e5" stroke-width="1" stroke-opacity="0.6"/>
  <text x="477" y="293" text-anchor="middle"
        font-family="'Segoe UI', system-ui, sans-serif" font-size="12.5" font-weight="600"
        letter-spacing="1" fill="#a5b4fc">SELF-HOSTED</text>

  <!-- Badge 2: Zero Logs -->
  <rect x="565" y="270" width="148" height="36" rx="8" fill="#1a1040" stroke="#d946ef" stroke-width="1" stroke-opacity="0.5"/>
  <text x="639" y="293" text-anchor="middle"
        font-family="'Segoe UI', system-ui, sans-serif" font-size="12.5" font-weight="600"
        letter-spacing="1" fill="#e879f9">ZERO LOGS</text>

  <!-- Badge 3: ~$0.004/hr -->
  <rect x="727" y="270" width="148" height="36" rx="8" fill="#0c1a1f" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.5"/>
  <text x="801" y="293" text-anchor="middle"
        font-family="'Segoe UI', system-ui, sans-serif" font-size="12.5" font-weight="600"
        letter-spacing="1" fill="#67e8f9">~$0.004 / HOUR</text>

  <!-- Bottom accent line -->
  <line x1="0" y1="399" x2="1280" y2="399" stroke="#4f46e5" stroke-width="1" stroke-opacity="0.25"/>
</svg>
